name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How to reproduce the bug
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: server
    attributes:
      label: Server software and version
      placeholder: "Paper 1.21.4"
    validations:
      required: true
